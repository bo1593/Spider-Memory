<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ذاكرة العناكب: نيون</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-purple: #bc13fe;
            --danger: #ff0055;
            --bg-dark: #020204;
            --card-bg: rgba(10, 10, 15, 0.9);
            --font-main: 'Orbitron', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #main-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #10101a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #game-logo {
            font-size: 40px;
            text-transform: uppercase;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .btn {
            padding: 16px 30px;
            border-radius: 5px;
            border: 2px solid transparent;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-main);
            width: 80%;
            max-width: 300px;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-google { background: white; color: #333; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-create { background: transparent; border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .btn-create:hover { background: var(--neon-purple); color: white; box-shadow: 0 0 30px var(--neon-purple); }
        .btn-join { background: var(--neon-green); color: black; box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }

        #menu-actions input {
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: white;
            text-align: center;
            font-size: 18px;
            font-family: var(--font-main);
            width: 80%;
            max-width: 300px;
            margin-bottom: 15px;
            outline: none;
        }

        #game-container { display: none; width: 100%; height: 100vh; position: relative; }
        #game-canvas { width: 100%; height: 100%; }

        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-box {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            font-size: 14px;
        }

        #turn-announcer-hud {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            background: var(--neon-purple);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 0 15px var(--neon-purple);
            white-space: nowrap;
        }

        #action-bar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid var(--neon-green);
            z-index: 1000;
            text-align: center;
            display: none;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.3s;
        }

        .modal.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .modal h2 { color: var(--neon-green); margin-top: 0; font-size: 22px; }

        .player-count-select { display: flex; gap: 10px; justify-content: center; margin: 15px 0; width: 80%; max-width: 300px; }
        .count-opt { flex: 1; background: #111; padding: 15px; border-radius: 5px; cursor: pointer; border: 1px solid #333; transition: 0.3s; font-weight: bold; text-align: center;}
        .count-opt.active { border-color: var(--neon-green); background: rgba(0, 255, 136, 0.1); color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    </style>
</head>
<body>

    <div id="main-menu">
        <div id="game-logo">Spider Memory</div>
        <button class="btn btn-google" id="login-btn" onclick="login()">Sign in with Google</button>
        
        <div id="menu-actions" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 5px;">إعداد غرفة جديدة:</p>
            <div class="player-count-select">
                <div class="count-opt active" onclick="setCount(2)">2</div>
                <div class="count-opt" onclick="setCount(3)">3</div>
                <div class="count-opt" onclick="setCount(4)">4</div>
            </div>
            <button class="btn btn-create" onclick="createRoom()">Create Room</button>
            <div style="width: 80%; max-width: 300px; height: 1px; background: #222; margin: 15px 0;"></div>
            <input type="text" id="room-input" placeholder="الكود (مثلاً: 1234)" maxlength="4">
            <button class="btn btn-join" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div class="hud-box" id="player-hearts-hud">❤️❤️❤️</div>
            <div class="hud-box" id="room-display-hud">#----</div>
        </div>
        <div id="turn-announcer-hud">جاري التحميل...</div>
        <div id="action-bar">
            <button class="btn btn-join" style="flex:1; margin:0;" onclick="startCupSelection()">اسحب كوب</button>
            <button class="btn btn-create" style="flex:1; margin:0;" onclick="drawCard()">اسحب كرت</button>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
        <button class="btn btn-join" style="width:auto; margin-top:15px;" onclick="closeModal()">موافق</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDh0y_wU6wTUMJgmKHpLC4jPemXgoQqhKM",
            authDomain: "spitar-game.firebaseapp.com",
            databaseURL: "https://spitar-game-default-rtdb.firebaseio.com/",
            projectId: "spitar-game",
            storageBucket: "spitar-game.firebasestorage.app",
            messagingSenderId: "790164742624",
            appId: "1:790164742624:web:762eef5608ba298e6f0b85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        let user = null, roomCode = null, selectedCount = 2, gameState = null;
        let isMyTurn = false;
        let interactionMode = 'NONE';
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let cupsRects = [];
        let particles = [], pulses = [];

        const COLORS = { green: '#00ff88', purple: '#bc13fe', danger: '#ff0055', cup_off: '#1a1a22', cup_on: '#0a0a0f' };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameState) renderGameCanvas();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function animationLoop() {
            if (gameState && document.getElementById('game-container').style.display === 'block') {
                renderGameCanvas();
                updateAndRenderParticles();
                updateAndRenderPulses();
            }
            requestAnimationFrame(animationLoop);
        }

        auth.onAuthStateChanged((loggedInUser) => {
            if (loggedInUser) {
                user = loggedInUser;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('menu-actions').style.display = 'flex';
                requestAnimationFrame(animationLoop);
            }
        });

        async function login() {
            try { await auth.signInWithPopup(provider); } catch (e) { alert("خطأ في تسجيل الدخول"); }
        }

        function setCount(n) {
            selectedCount = n;
            document.querySelectorAll('.count-opt').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function createRoom() {
            try {
                // تحويل الكود لنص فوراً لتجنب مشاكل الـ length
                let newCode = Math.floor(1000 + Math.random() * 9000).toString();
                await db.ref('rooms/' + newCode).set({
                    maxPlayers: selectedCount,
                    status: 'WAITING',
                    turnIndex: 0,
                    cups: Array(30).fill({ revealed: false, type: 'empty' }),
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                joinRoom(newCode); 
            } catch (e) { alert("فشل إنشاء الغرفة، تأكد من اتصال الإنترنت"); }
        }

        async function joinRoom(codeFromCreate) {
            try {
                roomCode = (codeFromCreate || document.getElementById('room-input').value).toString();
                if (!roomCode || roomCode.length < 4) return alert("الكود غير صحيح");

                const snap = await db.ref('rooms/' + roomCode).once('value');
                if(!snap.exists()) return alert("هذه الغرفة غير موجودة!");

                await db.ref(`rooms/${roomCode}/players/${user.uid}`).update({
                    name: user.displayName, hearts: 3, spiders: [], ready: false, photo: user.photoURL
                });
                startSync();
            } catch (e) { alert("حدث خطأ أثناء الانضمام"); }
        }

        function startSync() {
            document.getElementById('main-menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                document.getElementById('room-display-hud').innerText = "#" + roomCode;
                resizeCanvas();
            }, 500);

            db.ref('rooms/' + roomCode).on('value', snap => {
                gameState = snap.val();
                if(gameState) handleGameStateUpdate();
            });
        }

        function handleGameStateUpdate() {
            const me = gameState.players[user.uid];
            if(!me) return;
            document.getElementById('player-hearts-hud').innerText = "❤️".repeat(me.hearts);
            const pIds = Object.keys(gameState.players);
            const currentTurnId = pIds[gameState.turnIndex];
            isMyTurn = (currentTurnId === user.uid && gameState.status === 'PLAYING');

            if (!me.ready) {
                interactionMode = 'SETUP_SPIDERS';
                document.getElementById('turn-announcer-hud').innerText = `ضع 3 عناكب! (${me.spiders?.length || 0}/3)`;
                document.getElementById('action-bar').style.display = 'none';
            } else if (gameState.status === 'WAITING') {
                interactionMode = 'NONE';
                document.getElementById('turn-announcer-hud').innerText = "انتظار بقية اللاعبين...";
                document.getElementById('action-bar').style.display = 'none';
            } else if (gameState.status === 'PLAYING') {
                document.getElementById('turn-announcer-hud').innerText = isMyTurn ? "دورك! احذر من عناكبك!" : `دور: ${gameState.players[currentTurnId].name}`;
                document.getElementById('action-bar').style.display = isMyTurn ? 'flex' : 'none';
            }
        }

        function renderGameCanvas() {
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!gameState) return;
            const cols = 5, rows = 6, gap = 10, topP = 120, botP = 100;
            const size = Math.min((canvas.width - gap*6)/cols, (canvas.height - topP - botP - gap*7)/rows);
            const startX = (canvas.width - (size * cols + gap * 4)) / 2;
            cupsRects = [];
            const me = gameState.players[user.uid];

            for (let i = 0; i < 30; i++) {
                const x = startX + (i % cols) * (size + gap), y = topP + Math.floor(i/cols) * (size + gap);
                cupsRects.push({ x, y, w: size, h: size });
                drawNeonCup(x, y, size, gameState.cups[i], me, i);
            }
        }

        function drawNeonCup(x, y, size, data, me, index) {
            ctx.save();
            ctx.fillStyle = COLORS.cup_off;
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            let glow = null, icon = '?';
            if (interactionMode === 'SETUP_SPIDERS' && me.spiders?.includes(index)) { glow = COLORS.purple; icon = '🕷️'; }
            if (data.revealed) { 
                glow = data.type === 'spider' ? COLORS.danger : COLORS.green; 
                icon = data.type === 'spider' ? '🕷️' : '💨';
                ctx.fillStyle = COLORS.cup_on;
            }
            if (glow) { ctx.shadowColor = glow; ctx.shadowBlur = 15; ctx.strokeStyle = glow; }
            drawRoundedRect(ctx, x, y, size, size, 8);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = glow || 'white'; ctx.font = `${size/2}px Arial`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(icon, x + size/2, y + size/2);
            ctx.restore();
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            cupsRects.forEach((c, i) => {
                if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) handleCupClick(i, c.x + c.w/2, c.y + c.h/2);
            });
        };

        async function handleCupClick(index, cx, cy) {
            const me = gameState.players[user.uid];
            if (interactionMode === 'SETUP_SPIDERS') {
                let s = me.spiders || [];
                if(s.includes(index) || s.length >= 3) return;
                s.push(index); createPulse(cx, cy, COLORS.purple);
                await db.ref(`rooms/${roomCode}/players/${user.uid}/spiders`).set(s);
                if(s.length === 3) {
                    await db.ref(`rooms/${roomCode}/players/${user.uid}/ready`).set(true);
                    const snap = await db.ref(`rooms/${roomCode}/players`).once('value');
                    const allReady = Object.values(snap.val()).every(p => p.ready);
                    if(Object.keys(snap.val()).length == gameState.maxPlayers && allReady) db.ref(`rooms/${roomCode}/status`).set('PLAYING');
                }
            } else if (interactionMode === 'SELECT_CUP' && isMyTurn && !gameState.cups[index].revealed) {
                let hasS = Object.values(gameState.players).some(p => p.spiders?.includes(index));
                let updates = {};
                updates[`cups/${index}`] = { revealed: true, type: hasS ? 'spider' : 'empty' };
                if (hasS) { updates[`players/${user.uid}/hearts`] = me.hearts - 1; createExplosion(cx, cy, COLORS.danger); }
                updates['turnIndex'] = (gameState.turnIndex + 1) % Object.keys(gameState.players).length;
                await db.ref(`rooms/${roomCode}`).update(updates);
                interactionMode = 'NONE';
            }
        }

        function startCupSelection() { if (isMyTurn) interactionMode = 'SELECT_CUP'; }

        async function drawCard() {
            if (!isMyTurn) return;
            const cards = ['REVEAL_3', 'PARDON', 'TRAP'];
            const card = cards[Math.floor(Math.random() * cards.length)];
            let updates = {}, nextT = (gameState.turnIndex + 1) % Object.keys(gameState.players).length;
            if(card === 'REVEAL_3') {
                showModal("كرت الكاشف", "كشف 3 أكواب فارغة!");
                let count = 0, ids = Array.from({length: 30}, (_, i) => i).sort(() => 0.5 - Math.random());
                for(let i of ids) {
                    if(count >= 3) break;
                    let hasS = Object.values(gameState.players).some(p => p.spiders?.includes(i));
                    if(!hasS && !gameState.cups[i].revealed) { updates[`cups/${i}`] = { revealed: true, type: 'empty' }; count++; }
                }
            } else if(card === 'PARDON') { showModal("كرت العفو", "دور إضافي!"); nextT = gameState.turnIndex; }
            else { showModal("فخ نيون!", "فقدت قلباً!"); updates[`players/${user.uid}/hearts`] = gameState.players[user.uid].hearts - 1; }
            updates['turnIndex'] = nextT;
            await db.ref(`rooms/${roomCode}`).update(updates);
        }

        function drawRoundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.closePath();
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, r: 2, color, life: 25 });
        }

        function updateAndRenderParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            });
        }

        function createPulse(x, y, color) { pulses.push({ x, y, r: 5, max: 80, color, op: 1 }); }
        function updateAndRenderPulses() {
            pulses.forEach((p, i) => {
                p.r += 3; p.op -= 0.02;
                if(p.op <= 0) pulses.splice(i, 1);
                ctx.strokeStyle = p.color; ctx.globalAlpha = p.op; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1;
            });
        }

        function showModal(t, b) { 
            document.getElementById('modal-title').innerText = t; 
            document.getElementById('modal-body').innerText = b; 
            document.getElementById('game-modal').classList.add('open'); 
        }
        function closeModal() { document.getElementById('game-modal').classList.remove('open'); }
    </script>
</body>
</html>
