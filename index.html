<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider Memory: Cyberpunk Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
            --danger: #ff0055;
            --bg-dark: #020204;
            --glass: rgba(15, 15, 25, 0.95);
            --font-main: 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #10101a 0%, #000 100%);
            color: white; font-family: var(--font-main), sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        /* القائمة الجانبية (Sidebar) */
        #side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--glass); border-left: 2px solid var(--neon-blue);
            z-index: 2000; transition: 0.4s; padding: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #side-menu.open { right: 0; }
        
        .menu-toggle {
            position: fixed; top: 20px; right: 20px; font-size: 28px;
            color: var(--neon-blue); cursor: pointer; z-index: 2100;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
        }

        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px;
            background: rgba(255,255,255,0.03); border-radius: 5px;
        }

        /* القائمة الرئيسية */
        #main-menu {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; background: var(--bg-dark);
        }

        .btn {
            padding: 15px 30px; background: transparent; color: white;
            border: 1px solid var(--neon-blue); font-family: var(--font-main);
            width: 85%; max-width: 300px; margin-bottom: 12px; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: 0.3s; text-transform: uppercase;
        }

        .btn-create { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-join { background: var(--neon-green); color: black; border: none; font-weight: bold; }

        /* ستايل إدخال الهاتف والاسم */
        .phone-input {
            width: 85%; max-width: 300px; padding: 15px; margin: 10px 0;
            background: #111; border: 1px solid var(--neon-blue);
            color: white; text-align: center; font-size: 18px; border-radius: 5px;
        }

        /* اختيار اللاعبين */
        .selector-container { display: flex; gap: 10px; margin-bottom: 20px; width: 85%; max-width: 300px; }
        .p-choice {
            flex: 1; padding: 12px; border: 1px solid #333; text-align: center;
            cursor: pointer; background: rgba(255,255,255,0.05); border-radius: 4px;
        }
        .p-choice.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0,255,136,0.1); }

        #game-container { display: none; width: 100%; height: 100vh; position: relative; }
        #game-canvas { width: 100%; height: 100%; }

        #turn-display {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; border-radius: 5px; font-size: 12px; font-weight: bold;
            z-index: 50; min-width: 200px; text-align: center; text-transform: uppercase;
        }

        #controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: center; gap: 10px; padding: 0 20px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--glass); border: 1px solid var(--neon-green); padding: 30px; width: 85%; text-align: center; border-radius: 10px; }

        #winner-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 4000; }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menu-btn" style="display:none;" onclick="toggleSidebar()">☰</div>

    <div id="side-menu">
        <h2 style="color:var(--neon-blue); font-size: 18px; border-bottom: 1px solid;">بيانات الغرفة</h2>
        <p id="display-room-id" style="color:var(--neon-green); font-weight: bold; letter-spacing: 2px;">رقم الغرفة: #----</p>
        <div style="height: 20px;"></div>
        <h3 style="font-size: 14px; opacity: 0.8;">اللاعبين والقلوب:</h3>
        <div id="players-list"></div>
        <button class="btn btn-create" style="margin-top: 40px; font-size: 11px; width: 100%;" onclick="exitRoom()">خروج من اللعبة</button>
    </div>

    <div id="main-menu">
        <h1 style="color:var(--neon-green); text-shadow: 0 0 10px var(--neon-green); margin-bottom: 30px;">SPIDER MEMORY</h1>
        
        <div id="auth-selection" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <button class="btn" id="login-btn" onclick="handleAuth()">دخول باستخدام جوجل</button>
            <button class="btn btn-create" onclick="showPhoneUI()">دخول برقم الهاتف</button>
        </div>

        <div id="phone-ui" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <input type="text" id="user-nickname" class="phone-input" placeholder="اكتب اسمك هنا">
            <input type="tel" id="phone-number" class="phone-input" placeholder="+20 100 000 0000">
            <div id="recaptcha-container"></div>
            <button class="btn btn-join" onclick="sendSMSCode()">إرسال كود التحقق</button>
            
            <div id="verify-section" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                <input type="number" id="sms-code" class="phone-input" placeholder="ادخل الكود (6 أرقام)">
                <button class="btn btn-create" onclick="verifySMSCode()">تأكيد الدخول</button>
            </div>
            <button class="btn" style="border-color:var(--danger); color:var(--danger); margin-top:10px;" onclick="hidePhoneUI()">إلغاء</button>
        </div>
        
        <div id="lobby-ui" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.6;">حدد عدد اللاعبين للغرفة الجديدة:</p>
            <div class="selector-container">
                <div class="p-choice active" onclick="setCapacity(2)">2</div>
                <div class="p-choice" onclick="setCapacity(3)">3</div>
                <div class="p-choice" onclick="setCapacity(4)">4</div>
            </div>
            
            <button class="btn btn-create" onclick="createNewRoom()">إنشاء غرفة جديدة</button>
            <div style="margin: 15px 0; opacity: 0.3;">⎯⎯⎯⎯ أو ⎯⎯⎯⎯</div>
            <input type="number" id="room-input" style="width:85%; max-width: 300px; padding:15px; margin-bottom:12px; text-align:center; background:#111; color:#fff; border:1px solid #333; font-size: 18px;" placeholder="ادخل كود الغرفة">
            <button class="btn btn-join" onclick="joinExistingRoom()">دخول غرفة موجودة</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="turn-display">جاري الربط...</div>
        <div id="controls">
            <button class="btn btn-join" style="margin:0; flex:1;" onclick="setMode('SELECT')">كشف كوب</button>
            <button class="btn btn-create" style="margin:0; flex:1;" onclick="triggerCardDraw()">سحب كرت</button>
        </div>
    </div>

    <div id="winner-screen">
        <h1 style="color:var(--neon-green); font-size: 40px;">🏆 البطل 🏆</h1>
        <h2 id="winner-name" style="margin: 20px 0;">اسم اللاعب</h2>
        <button class="btn btn-join" onclick="exitRoom()">العودة للقائمة</button>
    </div>

    <div id="msg-modal" class="modal">
        <div class="modal-content">
            <h2 id="msg-title" style="color:var(--neon-green)"></h2>
            <p id="msg-body" style="margin: 20px 0;"></p>
            <button class="btn btn-join" style="width:100%" onclick="closeMsg()">فهمت</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDh0y_wU6wTUMJgmKHpLC4jPemXgoQqhKM",
            authDomain: "spitar-game.firebaseapp.com",
            databaseURL: "https://spitar-game-default-rtdb.firebaseio.com/",
            projectId: "spitar-game",
            storageBucket: "spitar-game.firebasestorage.app",
            messagingSenderId: "790164742624",
            appId: "1:790164742624:web:762eef5608ba298e6f0b85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        let currentUser, activeRoom, localGameState, playerMode = 'IDLE', roomCapacity = 2;
        let confirmationResult; 
        const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
        let cupBoundaries = [], vfxParticles = [], vfxPulses = [];

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            window.speechSynthesis.speak(utter);
        }

        function setCapacity(n) {
            roomCapacity = n;
            document.querySelectorAll('.p-choice').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleSidebar() { document.getElementById('side-menu').classList.toggle('open'); }

        function handleAuth() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function showPhoneUI() {
            document.getElementById('auth-selection').style.display = 'none';
            document.getElementById('phone-ui').style.display = 'flex';
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
        }

        function hidePhoneUI() {
            document.getElementById('auth-selection').style.display = 'flex';
            document.getElementById('phone-ui').style.display = 'none';
        }

        async function sendSMSCode() {
            const phone = document.getElementById('phone-number').value;
            const nickname = document.getElementById('user-nickname').value;
            
            if(!nickname) return triggerMsg("تنبيه", "برجاء كتابة اسمك أولاً");
            if(!phone.startsWith('+')) return triggerMsg("خطأ", "يجب كتابة الرقم بكود الدولة (مثلاً +20)");
            
            try {
                confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
                document.getElementById('verify-section').style.display = 'flex';
                triggerMsg("تم الإرسال", "سيصلك كود الآن في رسالة SMS");
            } catch (e) { triggerMsg("خطأ", e.message); }
        }

        async function verifySMSCode() {
            const code = document.getElementById('sms-code').value;
            const nickname = document.getElementById('user-nickname').value;
            try {
                const result = await confirmationResult.confirm(code);
                // تحديث اسم المستخدم في Firebase Profile
                await result.user.updateProfile({ displayName: nickname });
            } catch (e) { triggerMsg("خطأ", "الكود غير صحيح"); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-selection').style.display = 'none';
                document.getElementById('phone-ui').style.display = 'none';
                document.getElementById('lobby-ui').style.display = 'flex';
                startEngine();
            }
        });

        async function createNewRoom() {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            await db.ref('rooms/' + id).set({
                config: { max: roomCapacity, status: 'LOBBY', turn: 0, lastEvent: "" },
                cups: Array(30).fill({ state: 'closed' })
            });
            enterRoom(id);
        }

        function joinExistingRoom() {
            const id = document.getElementById('room-input').value;
            if (id) enterRoom(id.toString());
        }

        async function enterRoom(id) {
            activeRoom = id;
            const displayName = currentUser.displayName || currentUser.phoneNumber || "لاعب";
            await db.ref(`rooms/${id}/players/${currentUser.uid}`).set({
                name: displayName.split(' ')[0], hp: 3, traps: [], ready: false
            });
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('menu-btn').style.display = 'block';
            document.getElementById('display-room-id').innerText = "رقم الغرفة: #" + id;

            db.ref(`rooms/${id}/config/lastEvent`).on('value', snap => { if(snap.val()) speak(snap.val()); });
            db.ref(`rooms/${id}`).on('value', snap => { localGameState = snap.val(); if (localGameState) { updateUI(); checkWinner(); } });
        }

        function updateUI() {
            const players = localGameState.players;
            const me = players[currentUser.uid];
            const pIds = Object.keys(players);
            const list = document.getElementById('players-list');
            list.innerHTML = "";
            pIds.forEach(id => {
                const p = players[id];
                list.innerHTML += `<div class="player-row"><span style="color:${id === currentUser.uid ? 'var(--neon-green)' : 'white'}">${p.name}</span><span>${p.hp > 0 ? '❤️'.repeat(p.hp) : '<span style="color:var(--danger)">☠️</span>'}</span></div>`;
            });

            const turnDisplay = document.getElementById('turn-display'), controls = document.getElementById('controls');
            if (me.hp <= 0) {
                turnDisplay.innerText = "وضع المشاهدة"; turnDisplay.style.background = "var(--danger)";
                controls.style.display = 'none'; if (pIds[localGameState.config.turn] === currentUser.uid) passTurn();
            } else if (!me.ready) {
                playerMode = 'SETUP'; turnDisplay.innerText = `ضع 3 فخاخ [${me.traps?.length || 0}/3]`;
                turnDisplay.style.background = "var(--neon-purple)"; controls.style.display = 'none';
            } else if (localGameState.config.status === 'LOBBY') {
                turnDisplay.innerText = "بانتظار البقية..."; turnDisplay.style.background = "#333";
                if (pIds.length >= localGameState.config.max && Object.values(players).every(p => p.ready)) db.ref(`rooms/${activeRoom}/config/status`).set('PLAYING');
            } else {
                const isMyTurn = pIds[localGameState.config.turn] === currentUser.uid;
                turnDisplay.innerText = isMyTurn ? "دورك الآن!" : `انتظار: ${players[pIds[localGameState.config.turn]].name}`;
                turnDisplay.style.background = isMyTurn ? "var(--neon-green)" : "#111";
                turnDisplay.style.color = isMyTurn ? "#000" : "#fff";
                controls.style.display = isMyTurn ? 'flex' : 'none';
            }
        }

        async function triggerCardDraw() {
            const cards = [{t: "درع السيبر", b: "+1 قلب", h: 1}, {t: "فيروس هجين", b: "-1 قلب", h: -1}, {t: "إعادة تعيين", b: "دور إضافي", h: 0}, {t: "لغم مفاجئ", b: "-1 قلب", h: -1}, {t: "طاقة زائدة", b: "+1 قلب", h: 1}];
            const card = cards[Math.floor(Math.random()*cards.length)];
            speak(card.t);
            let up = {}; let currentHp = localGameState.players[currentUser.uid].hp;
            up[`players/${currentUser.uid}/hp`] = Math.max(0, currentHp + card.h);
            if(card.t !== "إعادة تعيين") up[`config/turn`] = (localGameState.config.turn + 1) % Object.keys(localGameState.players).length;
            db.ref(`rooms/${activeRoom}`).update(up);
            triggerMsg(card.t, card.b);
        }

        function checkWinner() {
            if(localGameState.config.status !== 'PLAYING') return;
            const alive = Object.values(localGameState.players).filter(p => p.hp > 0);
            if (alive.length === 1 && Object.keys(localGameState.players).length >= localGameState.config.max) {
                document.getElementById('winner-name').innerText = alive[0].name;
                document.getElementById('winner-screen').style.display = 'flex';
                db.ref(`rooms/${activeRoom}/config/status`).set('FINISHED');
            }
        }

        async function passTurn() {
            const pIds = Object.keys(localGameState.players);
            db.ref(`rooms/${activeRoom}/config/turn`).set((localGameState.config.turn + 1) % pIds.length);
        }

        function startEngine() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            function frame() { render(); updateVFX(); requestAnimationFrame(frame); }
            requestAnimationFrame(frame);
        }

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            if (!localGameState) return;
            const cols=5, rows=6, gap=10, size=Math.min((canvas.width-60)/cols, (canvas.height-280)/rows);
            const ox=(canvas.width-(size*cols+gap*(cols-1)))/2, oy=160;
            cupBoundaries = [];
            for (let i=0; i<30; i++) {
                const x=ox+(i%cols)*(size+gap), y=oy+Math.floor(i/cols)*(size+gap);
                cupBoundaries.push({x, y, size, index: i});
                const data = localGameState.cups[i], me = localGameState.players[currentUser.uid];
                ctx.save();
                let color = '#1a1a25', icon = '';
                if (playerMode === 'SETUP' && me.traps?.includes(i)) { color = '#bc13fe'; icon = '🕷️'; }
                else if (data.state === 'open') {
                    let hasS = Object.values(localGameState.players).some(p => p.traps?.includes(i));
                    color = hasS ? '#ff0055' : '#00ff88'; icon = hasS ? '🕷️' : '✔';
                }
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.strokeRect(x,y,size,size);
                ctx.fillStyle = color; ctx.font = `bold ${size/2}px sans-serif`; ctx.textAlign='center';
                ctx.fillText(icon || '?', x+size/2, y+size/1.5); ctx.restore();
            }
        }

        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0], r = canvas.getBoundingClientRect();
            handleInteraction(t.clientX-r.left, t.clientY-r.top);
        });

        async function handleInteraction(tx, ty) {
            cupBoundaries.forEach(async c => {
                if (tx>c.x && tx<c.x+c.size && ty>c.y && ty<c.y+c.size) {
                    if (playerMode === 'SETUP') {
                        let t = localGameState.players[currentUser.uid].traps || [];
                        if (t.length<3 && !t.includes(c.index)) {
                            t.push(c.index);
                            await db.ref(`rooms/${activeRoom}/players/${currentUser.uid}/traps`).set(t);
                            if (t.length===3) await db.ref(`rooms/${activeRoom}/players/${currentUser.uid}/ready`).set(true);
                        }
                    } else if (playerMode === 'SELECT') {
                        if (localGameState.cups[c.index].state === 'open') return;
                        playerMode = 'IDLE';
                        let hasS = false; Object.values(localGameState.players).forEach(p => { if (p.traps?.includes(c.index)) hasS = true; });
                        let up = {}; up[`cups/${c.index}/state`] = 'open';
                        if (hasS) { 
                            up[`players/${currentUser.uid}/hp`] = Math.max(0, localGameState.players[currentUser.uid].hp - 1);
                            up[`config/lastEvent`] = "انفجار لـ " + localGameState.players[currentUser.uid].name;
                            createExp(c.x+c.size/2, c.y+c.size/2, '#ff0055');
                        } else { vfxPulses.push({x:c.x+c.size/2,y:c.y+c.size/2,r:0,opacity:1,c:'#00ff88'}); }
                        up[`config/turn`] = (localGameState.config.turn + 1) % Object.keys(localGameState.players).length;
                        db.ref(`rooms/${activeRoom}`).update(up);
                    }
                }
            });
        }

        function createExp(x,y,c) { for(let i=0;i<15;i++) vfxParticles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:1,c}); }
        function updateVFX() {
            vfxParticles.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.life-=0.03; if(p.life<=0) vfxParticles.splice(i,1); ctx.fillStyle=p.c; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,2,2); });
            vfxPulses.forEach((p,i)=>{ p.r+=3; p.opacity-=0.04; if(p.opacity<=0) vfxPulses.splice(i,1); ctx.strokeStyle=p.c; ctx.globalAlpha=p.opacity; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke(); });
            ctx.globalAlpha=1;
        }

        function setMode(m) { playerMode = m; }
        function triggerMsg(t,b) { document.getElementById('msg-title').innerText=t; document.getElementById('msg-body').innerText=b; document.getElementById('msg-modal').style.display='flex'; }
        function closeMsg() { document.getElementById('msg-modal').style.display='none'; }
        function exitRoom() { location.reload(); }
    </script>
</body>
</html>
