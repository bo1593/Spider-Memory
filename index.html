<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider Memory: Cyberpunk Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        /* === إعدادات التصميم (Cyberpunk UI) === */
        :root {
            --neon-green: #00ff88;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
            --danger: #ff0055;
            --bg-dark: #020204;
            --glass: rgba(15, 15, 25, 0.85);
            --font-main: 'Orbitron', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #10101a 0%, #000 100%),
                linear-gradient(rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            font-family: var(--font-main), sans-serif;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* القائمة الرئيسية */
        #main-menu {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; background: var(--bg-dark);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-container {
            text-align: center; margin-bottom: 40px;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; text-shadow: 0 0 20px var(--neon-green); }
        }

        #game-logo {
            font-size: 45px; font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 4px; line-height: 1;
        }

        .btn {
            position: relative; padding: 18px 35px;
            background: transparent; color: white;
            border: 1px solid var(--neon-blue);
            font-family: var(--font-main); font-size: 14px;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; overflow: hidden;
            width: 85%; max-width: 320px; margin-bottom: 20px;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
        }

        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .btn:active::before { left: 100%; }
        .btn-create { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-join { background: var(--neon-green); color: black; border: none; font-weight: bold; }

        #room-input {
            width: 85%; max-width: 320px; padding: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: var(--neon-green); text-align: center;
            font-size: 20px; font-family: var(--font-main);
            margin-bottom: 20px; outline: none;
        }

        /* حاوية اللعبة */
        #game-container { display: none; width: 100%; height: 100vh; position: relative; }
        #game-canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* شريط الحالة (HUD) */
        #hud {
            position: absolute; top: 0; width: 100%;
            padding: 20px; display: flex; justify-content: space-between;
            pointer-events: none; z-index: 10;
        }

        .hud-item {
            background: var(--glass); padding: 12px 20px;
            border-left: 3px solid var(--neon-blue);
            backdrop-filter: blur(10px); font-size: 14px;
        }

        #turn-display {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--neon-purple); padding: 5px 25px;
            border-radius: 50px; font-size: 12px; font-weight: bold;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* أزرار التحكم السفلية */
        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: center; gap: 15px; padding: 0 20px;
        }

        /* المودال */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }

        .modal-content {
            background: var(--glass); border: 1px solid var(--neon-green);
            padding: 40px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .player-count { display: flex; gap: 10px; margin: 20px 0; width: 100%; }
        .count-btn { 
            flex: 1; padding: 15px; background: #111; border: 1px solid #333; 
            color: white; cursor: pointer; transition: 0.3s;
        }
        .count-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

    </style>
</head>
<body>

    <div id="main-menu">
        <div class="logo-container">
            <div id="game-logo">SPIDER<br>MEMORY</div>
            <div style="font-size: 10px; letter-spacing: 5px; margin-top: 10px; color: var(--neon-blue);">SYSTEM ONLINE</div>
        </div>

        <button class="btn" id="login-btn" onclick="handleAuth()">Initialize Identity</button>

        <div id="lobby-ui" style="display: none; width: 100%; flex-direction: column; align-items: center;">
            <div class="player-count">
                <button class="count-btn active" onclick="updateMax(2, this)">2-PLYR</button>
                <button class="count-btn" onclick="updateMax(3, this)">3-PLYR</button>
                <button class="count-btn" onclick="updateMax(4, this)">4-PLYR</button>
            </div>
            <button class="btn btn-create" onclick="createNewRoom()">Create Terminal</button>
            <div style="margin: 20px 0; color: #444;">OR</div>
            <input type="number" id="room-input" placeholder="0000">
            <button class="btn btn-join" onclick="joinExistingRoom()">Join Terminal</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="hud">
            <div class="hud-item" id="stats-hearts">HP: ❤️❤️❤️</div>
            <div class="hud-item" id="stats-room">NODE: #----</div>
        </div>

        <div id="turn-display">WAITING FOR UPLINK...</div>

        <div id="controls">
            <button class="btn btn-join" style="margin:0; flex:1;" onclick="setMode('SELECT')">PICK CUP</button>
            <button class="btn btn-create" style="margin:0; flex:1;" onclick="triggerCardDraw()">DRAW CARD</button>
        </div>
    </div>

    <div id="msg-modal" class="modal">
        <div class="modal-content">
            <h2 id="msg-title" style="color: var(--neon-green); font-size: 24px;"></h2>
            <p id="msg-body" style="margin: 20px 0; line-height: 1.6;"></p>
            <button class="btn btn-join" onclick="closeMsg()">ACKNOWLEDGE</button>
        </div>
    </div>

    <script>
        // === CORE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyDh0y_wU6wTUMJgmKHpLC4jPemXgoQqhKM",
            authDomain: "spitar-game.firebaseapp.com",
            databaseURL: "https://spitar-game-default-rtdb.firebaseio.com/",
            projectId: "spitar-game",
            storageBucket: "spitar-game.firebasestorage.app",
            messagingSenderId: "790164742624",
            appId: "1:790164742624:web:762eef5608ba298e6f0b85"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        let currentUser = null;
        let activeRoom = null;
        let maxPlayers = 2;
        let localGameState = null;
        let playerMode = 'IDLE'; // IDLE, SETUP, SELECT

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let cupBoundaries = [];
        let vfxParticles = [];
        let vfxPulses = [];

        // === AUTHENTICATION ===
        function handleAuth() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('lobby-ui').style.display = 'flex';
                startEngine();
            }
        });

        // === ROOM MANAGEMENT ===
        function updateMax(num, el) {
            maxPlayers = num;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        async function createNewRoom() {
            const id = Math.floor(1000 + Math.random() * 9000);
            await db.ref('rooms/' + id).set({
                config: { max: maxPlayers, status: 'LOBBY', turn: 0 },
                cups: Array(30).fill({ state: 'closed', type: 'void' }),
                timestamp: Date.now()
            });
            enterRoom(id);
        }

        function joinExistingRoom() {
            const id = document.getElementById('room-input').value;
            if (id.length === 4) enterRoom(id);
        }

        async function enterRoom(id) {
            activeRoom = id;
            await db.ref(`rooms/${id}/players/${currentUser.uid}`).set({
                name: currentUser.displayName.split(' ')[0],
                hp: 3,
                traps: [],
                ready: false
            });

            document.getElementById('main-menu').style.transform = 'translateY(-100%)';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('stats-room').innerText = `NODE: #` + id;
            
            syncRoom();
        }

        function syncRoom() {
            db.ref(`rooms/${activeRoom}`).on('value', snapshot => {
                localGameState = snapshot.val();
                if (localGameState) processFrame();
            });
        }

        // === GAME LOGIC ===
        function processFrame() {
            const me = localGameState.players[currentUser.uid];
            const pIds = Object.keys(localGameState.players);
            const isTurn = pIds[localGameState.config.turn] === currentUser.uid;

            document.getElementById('stats-hearts').innerText = `HP: ` + "❤️".repeat(me.hp);

            if (!me.ready) {
                playerMode = 'SETUP';
                document.getElementById('turn-display').innerText = `DEPLOY 3 SPIDERS [${me.traps?.length || 0}/3]`;
                document.getElementById('controls').style.display = 'none';
            } else if (localGameState.config.status === 'LOBBY') {
                document.getElementById('turn-display').innerText = `WAITING FOR CONNECTION...`;
                if (pIds.length == localGameState.config.max && Object.values(localGameState.players).every(p => p.ready)) {
                    db.ref(`rooms/${activeRoom}/config/status`).set('ACTIVE');
                }
            } else {
                const turnName = localGameState.players[pIds[localGameState.config.turn]].name;
                document.getElementById('turn-display').innerText = isTurn ? "YOUR TURN - OPERATE" : `PENDING: ${turnName.toUpperCase()}`;
                document.getElementById('controls').style.display = isTurn ? 'flex' : 'none';
            }
        }

        // === ENGINE & RENDERING ===
        function startEngine() {
            function frame() {
                render();
                updateVFX();
                requestAnimationFrame(frame);
            }
            resize();
            window.addEventListener('resize', resize);
            requestAnimationFrame(frame);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            if (!localGameState) return;

            const cols = 5, rows = 6, gap = 12;
            const size = Math.min((canvas.width - 80) / cols, (canvas.height - 300) / rows);
            const offsetX = (canvas.width - (size * cols + gap * (cols - 1))) / 2;
            const offsetY = 140;

            cupBoundaries = [];

            for (let i = 0; i < 30; i++) {
                const x = offsetX + (i % cols) * (size + gap);
                const y = offsetY + Math.floor(i / cols) * (size + gap);
                cupBoundaries.push({ x, y, size, index: i });

                const data = localGameState.cups[i];
                const me = localGameState.players[currentUser.uid];
                
                ctx.save();
                let color = '#1a1a25';
                let icon = '';

                // منطق الإظهار
                if (playerMode === 'SETUP' && me.traps?.includes(i)) {
                    color = varColor('--neon-purple'); icon = '🕷️';
                } else if (data.state === 'open') {
                    const isSpider = Object.values(localGameState.players).some(p => p.traps?.includes(i));
                    color = isSpider ? varColor('--danger') : varColor('--neon-green');
                    icon = isSpider ? '🕷️' : '✔';
                }

                // رسم الكوب النيوني
                ctx.shadowBlur = (color !== '#1a1a25') ? 15 : 0;
                ctx.shadowColor = color;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.fillStyle = 'rgba(10, 10, 15, 0.9)';
                
                roundRect(ctx, x, y, size, size, 5, true, true);
                
                ctx.fillStyle = color;
                ctx.font = `bold ${size/2.5}px Orbitron`;
                ctx.textAlign = 'center';
                ctx.fillText(icon || '?', x + size/2, y + size/1.6);
                ctx.restore();
            }
        }

        // === INTERACTIONS ===
        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const tx = touch.clientX - rect.left;
            const ty = touch.clientY - rect.top;

            cupBoundaries.forEach(cup => {
                if (tx > cup.x && tx < cup.x + cup.size && ty > cup.y && ty < cup.y + cup.size) {
                    handleInteraction(cup.index, cup.x + cup.size/2, cup.y + cup.size/2);
                }
            });
        });

        async function handleInteraction(idx, cx, cy) {
            if (playerMode === 'SETUP') {
                let traps = localGameState.players[currentUser.uid].traps || [];
                if (traps.length < 3 && !traps.includes(idx)) {
                    traps.push(idx);
                    createPulse(cx, cy, varColor('--neon-purple'));
                    await db.ref(`rooms/${activeRoom}/players/${currentUser.uid}/traps`).set(traps);
                    if (traps.length === 3) await db.ref(`rooms/${activeRoom}/players/${currentUser.uid}/ready`).set(true);
                }
            } else if (playerMode === 'SELECT') {
                const isTurn = Object.keys(localGameState.players)[localGameState.config.turn] === currentUser.uid;
                if (!isTurn || localGameState.cups[idx].state === 'open') return;

                playerMode = 'IDLE';
                let isSpider = false;
                Object.values(localGameState.players).forEach(p => { if (p.traps?.includes(idx)) isSpider = true; });

                let updates = {};
                updates[`cups/${idx}/state`] = 'open';
                if (isSpider) {
                    updates[`players/${currentUser.uid}/hp`] = localGameState.players[currentUser.uid].hp - 1;
                    createExplosion(cx, cy, varColor('--danger'));
                    triggerMsg("BREACH!", "You hit a spider drone. Integrity compromised.");
                } else {
                    createPulse(cx, cy, varColor('--neon-green'));
                }

                updates[`config/turn`] = (localGameState.config.turn + 1) % Object.keys(localGameState.players).length;
                db.ref(`rooms/${activeRoom}`).update(updates);
            }
        }

        function setMode(m) { playerMode = m; }

        async function triggerCardDraw() {
            const types = ['GLITCH', 'SCAN', 'REPAIR'];
            const card = types[Math.floor(Math.random() * types.length)];
            let up = {};
            let nextTurn = (localGameState.config.turn + 1) % Object.keys(localGameState.players).length;

            if (card === 'SCAN') {
                triggerMsg("SCANNER ACTIVE", "3 empty nodes revealed on your grid.");
                let found = 0;
                for (let i=0; i<30; i++) {
                    let hasS = Object.values(localGameState.players).some(p => p.traps?.includes(i));
                    if (!hasS && localGameState.cups[i].state === 'closed' && found < 3) {
                        up[`cups/${i}/state`] = 'open'; found++;
                    }
                }
            } else if (card === 'GLITCH') {
                triggerMsg("SYSTEM GLITCH", "Extra operation cycle granted.");
                nextTurn = localGameState.config.turn;
            } else {
                triggerMsg("MALWARE", "Card was corrupted. HP lost.");
                up[`players/${currentUser.uid}/hp`] = localGameState.players[currentUser.uid].hp - 1;
            }

            up[`config/turn`] = nextTurn;
            db.ref(`rooms/${activeRoom}`).update(up);
        }

        // === VFX HELPERS ===
        function createExplosion(x, y, color) {
            for (let i=0; i<25; i++) {
                vfxParticles.push({
                    x, y, color,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 1.0
                });
            }
        }

        function createPulse(x, y, color) {
            vfxPulses.push({ x, y, r: 0, color, opacity: 1 });
        }

        function updateVFX() {
            vfxParticles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) vfxParticles.splice(i, 1);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            });
            vfxPulses.forEach((p, i) => {
                p.r += 5; p.opacity -= 0.04;
                if (p.opacity <= 0) vfxPulses.splice(i, 1);
                ctx.strokeStyle = p.color; ctx.globalAlpha = p.opacity;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
            });
            ctx.globalAlpha = 1;
        }

        // === UTILS ===
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
        
        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath(); ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
            if (fill) ctx.fill(); if (stroke) ctx.stroke();
        }

        function triggerMsg(t, b) {
            document.getElementById('msg-title').innerText = t;
            document.getElementById('msg-body').innerText = b;
            document.getElementById('msg-modal').style.display = 'flex';
        }

        function closeMsg() { document.getElementById('msg-modal').style.display = 'none'; }

    </script>
</body>
</html>
